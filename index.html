<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BSMLH v9.1</title>
<style>
/* ТВОИ СТИЛИ ИЗ v9.0 */
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,sans-serif;-webkit-tap-highlight-color:transparent}
:root{--gold:#f6851b;--green:#07c160;--dark:#1a1a1a;--gray:#888}
body{background:#000;color:#fff;height:100vh;overflow:hidden;position:fixed;width:100%}

/* ЗАСТАВКА */
#splash{position:fixed;inset:0;z-index:999;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;animation:fadeOut 0.5s forwards 2.5s;pointer-events:none}
@keyframes fadeOut{to{opacity:0;visibility:hidden}}
.s1{font-size:56px;font-weight:900;letter-spacing:10px}
.s2{font-size:10px;color:#aaa;margin-top:10px;text-align:center;max-width:260px;text-transform:uppercase;letter-spacing:1px}

/* ЭКРАНЫ ВХОДА (СТАБИЛЬНЫЕ) */
.scr{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;padding:30px;background:#000;z-index:100}
.scr.on{display:flex}
input{background:#111;border:1px solid #333;padding:15px;color:#fff;border-radius:12px;width:100%;max-width:300px;margin-bottom:14px;outline:none;font-size:15px}
.btn{background:var(--gold);color:#000;border:none;padding:16px;border-radius:12px;font-weight:700;width:100%;max-width:300px;cursor:pointer;font-size:15px;margin-bottom:10px}
#video{width:220px;height:220px;border-radius:50%;object-fit:cover;border:3px solid var(--gold);transform:scaleX(-1);margin-bottom:20px}
.nfc-box{width:100px;height:100px;border:2px solid #00f2ff;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:44px;margin-bottom:20px}

/* APP ИНТЕРФЕЙС */
#app{display:none;height:100vh;flex-direction:column;background:#ededed;position:absolute;inset:0;color:#000;z-index:500}
#hdr{height:54px;background:var(--dark);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:17px;flex-shrink:0}
#body{flex:1;overflow-y:auto}
#nav{height:76px;padding-bottom:16px;display:flex;justify-content:space-around;align-items:center;background:#f7f7f7;border-top:0.5px solid #ddd;flex-shrink:0}
.nb{display:flex;flex-direction:column;align-items:center;color:#999;font-size:10px;font-weight:600;cursor:pointer}
.nb i{font-size:22px;font-style:normal;margin-bottom:2px}
.nb.on{color:var(--green)}
.tab{display:none}.tab.on{display:block}

/* ПРОФИЛЬ И КОШЕЛЕК (ТВОЙ ДИЗАЙН) */
.ph{background:#fff;padding:28px 18px;display:flex;align-items:center;margin-bottom:8px;position:relative}
#pp{width:62px;height:62px;border-radius:10px;object-fit:cover;margin-right:14px;background:#eee}
.tr{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 8px;margin-bottom:8px}
.tc{background:#fff;border-radius:12px;padding:14px;text-align:center;cursor:pointer}
.tl{font-size:10px;color:var(--gray);text-transform:uppercase;margin-bottom:4px}
.tv{font-size:22px;font-weight:700}.tv.g{color:var(--gold)}.tv.gr{color:var(--green)}
.mg{background:#fff;margin-bottom:8px;border-top:0.5px solid #ddd;border-bottom:0.5px solid #ddd}
.mi{display:flex;align-items:center;padding:14px 18px;cursor:pointer;position:relative}

/* СТРАНИЦЫ/МОДАЛКИ */
.pg{position:fixed;inset:0;background:#ededed;z-index:800;display:none;flex-direction:column}
.pg.on{display:flex}
.pgh{height:54px;background:var(--dark);color:#fff;display:flex;align-items:center;padding:0 15px}
.bk{font-size:28px;margin-right:10px;cursor:pointer}
#ts{position:fixed;top:65px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:#fff;padding:10px 20px;border-radius:18px;font-size:13px;z-index:1000;opacity:0;transition:opacity 0.2s}
#ts.on{opacity:1}
</style>
</head>
<body>

<div id="splash"><div class="s1">BSMLH</div><div class="s2">Biometric Security Multifunction Ledger for Humanity</div></div>

<div id="s0" class="scr on">
  <h2 style="margin-bottom:20px">РЕГИСТРАЦИЯ</h2>
  <input id="nm" placeholder="Имя и фамилия">
  <button class="btn" onclick="go1()">ДАЛЕЕ →</button>
</div>

<div id="s1" class="scr">
  <video id="video" autoplay playsinline></video>
  <button class="btn" onclick="snap()">📸 СФОТОГРАФИРОВАТЬ</button>
  <canvas id="cv" style="display:none"></canvas>
</div>

<div id="s2" class="scr">
  <div class="nfc-box">🛡️</div>
  <div id="nfc-txt" style="color:#00f2ff;margin-bottom:15px"></div>
  <button class="btn" onclick="doNFC()">АКТИВИРОВАТЬ NFC</button>
  <div style="color:#555;text-decoration:underline;cursor:pointer;margin-top:10px" onclick="launch()">Войти без чипа</div>
</div>

<div id="app">
  <div id="hdr">BSMLH</div>
  <div id="body">
    
    <div id="tab-chat" class="tab on">
        </div>

    <div id="tab-maps" class="tab" style="height:100%">
        <iframe src="https://www.google.com/maps/embed" style="width:100%;height:100%;border:0" loading="lazy"></iframe>
    </div>

    <div id="tab-hub" class="tab">
      <div style="padding:15px">
        <div style="background:var(--dark);color:var(--gold);padding:20px;border-radius:14px;text-align:center;font-weight:700;margin-bottom:12px;cursor:pointer" onclick="showPg('pg-pat')">🛠 ПАТЕНТНАЯ МАСТЕРСКАЯ</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div style="background:#fff;padding:24px 10px;border-radius:12px;text-align:center;font-weight:700" onclick="T('🚧 Скоро')">💻 Apps</div>
          <div style="background:#fff;padding:24px 10px;border-radius:12px;text-align:center;font-weight:700" onclick="T('🔍 Scan QR')">🔍 Scan</div>
        </div>
      </div>
    </div>

    <div id="tab-prof" class="tab">
      <div class="ph">
        <img id="pp" src="" alt="">
        <div class="pi"><h2 id="pn">User</h2><p id="ph2">HUID: —</p><span style="color:var(--green);font-size:12px">✓ Верифицирован</span></div>
      </div>
      <div class="tr">
        <div class="tc" onclick="showPg('pg-wal')"><div class="tl">QRT</div><div class="tv g" id="mq">0.01</div></div>
        <div class="tc" onclick="showPg('pg-wal')"><div class="tl">QRNC</div><div class="tv gr" id="mr">0</div></div>
      </div>
      <div class="mg"><div class="mi" onclick="showPg('pg-set')">⚙️ <span style="margin-left:10px">Settings</span></div></div>
    </div>

  </div>

  <div id="nav">
    <div class="nb on" id="nb-chat" onclick="tab('chat','BSMLH')"><i>💬</i>Chat</div>
    <div class="nb" id="nb-maps" onclick="tab('maps','Maps')"><i>🗺️</i>Maps</div>
    <div class="nb" id="nb-hub" onclick="tab('hub','HUB')"><i>⚡</i>Hub</div>
    <div class="nb" id="nb-prof" onclick="tab('prof','Профиль')"><i>👤</i>Profile</div>
  </div>
</div>

<div id="pg-set" class="pg">
    <div class="pgh"><span class="bk" onclick="hidePg('pg-set')">‹</span>Settings</div>
    <div style="padding:20px; color:#000">
        <p>Версия приложения: v9.1</p>
        <button class="btn" style="margin-top:20px; background:red; color:#fff" onclick="location.reload()">Выйти</button>
    </div>
</div>

<div id="pg-wal" class="pg">
    <div class="pgh"><span class="bk" onclick="hidePg('pg-wal')">‹</span>Wallet</div>
    <div style="padding:20px; color:#000; text-align:center">
        <h1 id="wq" style="font-size:40px; color:var(--gold)">0.01</h1>
        <p>Баланс QRT</p>
    </div>
</div>

<div id="ts"></div>

<script>
var U={name:'',huid:'',photo:'',qrt:0.01,qrnc:0};

// РЕГИСТРАЦИЯ
async function go1(){
    var n=document.getElementById('nm').value.trim();
    if(!n){T('⚠️ Введите имя');return;}
    U.name=n;
    document.getElementById('s0').classList.remove('on');
    document.getElementById('s1').classList.add('on');
    const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}});
    document.getElementById('video').srcObject=s;
}
function snap(){
    var v=document.getElementById('video'),c=document.getElementById('cv');
    c.width=v.videoWidth;c.height=v.videoHeight;
    c.getContext('2d').drawImage(v,0,0);
    U.photo=c.toDataURL();
    if(v.srcObject)v.srcObject.getTracks().forEach(t=>t.stop());
    document.getElementById('s1').classList.remove('on');
    document.getElementById('s2').classList.add('on');
}
function doNFC(){document.getElementById('nfc-txt').innerText='ОЖИДАНИЕ ЧИПА...';setTimeout(launch,2000);}

function launch(){
    U.huid=Math.random().toString(36).substr(2,8).toUpperCase();
    document.getElementById('pn').innerText=U.name;
    document.getElementById('ph2').innerText='HUID: '+U.huid;
    if(U.photo)document.getElementById('pp').src=U.photo;
    document.querySelectorAll('.scr').forEach(s=>s.style.display='none');
    document.getElementById('app').style.display='flex';
    loadChats();
}

// НАВИГАЦИЯ ВНУТРИ ПРИЛОЖЕНИЯ
function tab(name,title){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
    document.querySelectorAll('.nb').forEach(n=>n.classList.remove('on'));
    document.getElementById('tab-'+name).classList.add('on');
    document.getElementById('nb-'+name).classList.add('on');
    document.getElementById('hdr').innerText=title;
}

function showPg(id){document.getElementById(id).classList.add('on');}
function hidePg(id){document.getElementById(id).classList.remove('on');}

function loadChats(){
    var d=[{n:'Alex Chen',a:'🤖',m:'Secure connection active'},{n:'Sarah Kim',a:'🎨',m:'Patent approved! 🎉'}];
    document.getElementById('tab-chat').innerHTML=d.map(x=>`
        <div style="display:flex;padding:15px;background:#fff;border-bottom:1px solid #eee">
            <div style="width:45px;height:45px;background:#eee;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-right:12px;font-size:20px">${x.a}</div>
            <div><b>${x.n}</b><p style="font-size:13px;color:#888">${x.m}</p></div>
        </div>
    `).join('');
}

var tt;function T(m){var e=document.getElementById('ts');e.innerText=m;e.classList.add('on');clearTimeout(tt);tt=setTimeout(()=>e.classList.remove('on'),2200);}
</script>
</body>
</html>
